<!DOCTYPE html>
<html class="dark" lang="en" id="root-html">
<head>
    <meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Terminal Booting...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --primary: #2b6cee; }
        .dark { --bg: #050505; --surf: rgba(10, 15, 20, 0.85); --text: #e2e8f0; --border: rgba(43, 108, 238, 0.2); --term-bg: rgba(0, 0, 0, 0.7); --term-text: #cbd5e1; --term-highlight: #ffffff; }
        .light { --bg: #f8fafc; --surf: rgba(255, 255, 255, 0.95); --text: #1e293b; --border: rgba(0,0,0,0.1); --term-bg: rgba(241, 245, 249, 0.85); --term-text: #334155; --term-highlight: #0f172a; }
        
        body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; transition: background 0.4s ease, color 0.4s ease; margin: 0; }
        .glass { background: var(--surf); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--border); transition: background 0.4s ease, border 0.4s ease; }
        .terminal-container { background: var(--term-bg); color: var(--term-text); transition: background 0.4s ease, color 0.4s ease; }
        .terminal-font { font-family: 'Fira Code', monospace; font-size: 0.9rem; line-height: 1.6; }
        
        .crt::before { content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%); background-size: 100% 4px; z-index: 50; pointer-events: none; opacity: 0.5; }
        .cursor-block { display: inline-block; width: 8px; height: 1em; background-color: var(--primary); vertical-align: middle; animation: blink 1s step-end infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        
        /* THE MOBILE TYPING FIX: Perfectly positioned, invisible input field */
        #hidden-input { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; color: transparent; background: transparent; border: none; outline: none; font-size: 16px; z-index: 10; cursor: text; }
        
        #id-card { cursor: grab; z-index: 50; transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 20px 40px -10px rgba(0,0,0,0.4); touch-action: none; }
        #id-card.dragging { cursor: grabbing; transition: none; }
        #string { stroke: var(--primary); stroke-width: 3; fill: none; opacity: 0; transition: opacity 0.3s; filter: drop-shadow(0 0 4px var(--primary)); }
        .active-string #string { opacity: 1; }
        @keyframes sway { 0% { transform: rotate(-1.5deg); } 100% { transform: rotate(1.5deg); } }
        .sway { animation: sway 4s ease-in-out infinite alternate; }
        .terminal-scroll::-webkit-scrollbar { width: 6px; }
        .terminal-scroll::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }
    </style>
</head>

<body class="h-[100dvh] w-full overflow-hidden flex relative">

    <div id="mobile-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-30 hidden opacity-0 transition-opacity duration-300 md:hidden"></div>

    <div class="fixed top-4 right-4 z-50 flex gap-3">
        <button onclick="toggleSidebar()" class="md:hidden p-3 glass rounded-full shadow-[0_0_15px_var(--border)] active:scale-95 transition-transform text-[var(--primary)] flex items-center justify-center">
            <span class="material-symbols-outlined">badge</span>
        </button>
        <button onclick="toggleTheme()" class="p-3 glass rounded-full shadow-[0_0_15px_var(--border)] hover:scale-110 active:scale-95 transition-transform text-[var(--primary)] flex items-center justify-center">
            <span id="theme-icon" class="material-symbols-outlined">dark_mode</span>
        </button>
    </div>

    <aside id="sidebar" class="absolute md:relative z-40 inset-y-0 left-0 w-[85%] max-w-[340px] md:w-80 glass border-r border-[var(--border)] flex flex-col p-6 overflow-y-auto terminal-scroll transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-out">
        <div id="card-area" class="relative w-full h-[380px] md:h-[420px] flex justify-center mt-8 shrink-0">
            <svg class="absolute inset-0 w-full h-full pointer-events-none overflow-visible">
                <circle cx="50%" cy="5" r="5" fill="var(--primary)" />
                <path id="string" d="M 160 5 L 160 55" />
            </svg>
            
            <div id="id-card" class="absolute top-10 w-[240px] md:w-[260px] glass rounded-2xl p-6 border-t-4 border-t-[var(--primary)] sway origin-top">
                <div class="absolute -top-3 left-1/2 transform -translate-x-1/2 w-8 h-4 bg-[var(--surf)] border border-[var(--primary)] rounded shadow-sm z-20 flex justify-center items-center">
                    <div class="w-2 h-2 rounded-full bg-black/50"></div>
                </div>

                <div class="relative w-24 h-24 md:w-28 md:h-28 mx-auto mb-4 rounded-full p-1 bg-gradient-to-b from-[var(--primary)] to-transparent shadow-lg">
                    <div class="w-full h-full rounded-full overflow-hidden bg-slate-800 flex items-center justify-center">
                        <img id="ui-photo" src="" alt="Profile" class="block w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-700" onerror="this.onerror=null; this.src='data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20150%20150%22%3E%3Crect%20width%3D%22150%22%20height%3D%22150%22%20fill%3D%22%231e293b%22%2F%3E%3Cpath%20d%3D%22M75%2075c12.4%200%2022.5-10.1%2022.5-22.5S87.4%2030%2075%2030s-22.5%2010.1-22.5%2022.5S62.6%2075%2075%2075zm0%2015c-15.1%200-45%207.6-45%2022.5V120h90v-7.5c0-14.9-29.9-22.5-45-22.5z%22%20fill%3D%22%23475569%22%2F%3E%3C%2Fsvg%3E'">
                    </div>
                </div>
                
                <div class="text-center">
                    <h2 id="ui-name" class="text-lg md:text-xl font-bold uppercase tracking-tight text-[var(--term-highlight)] leading-tight mb-1">SYSTEM OFFLINE</h2>
                    <p id="ui-role" class="text-[var(--primary)] text-[10px] font-bold tracking-widest mb-4">AWAITING DATA</p>
                    <div class="bg-[var(--primary)]/10 border border-[var(--primary)]/30 rounded py-1 px-3 text-[10px] terminal-font text-[var(--primary)] inline-block font-bold" id="ui-badge">ERR_NULL</div>
                </div>
            </div>
        </div>

        <div class="mt-auto flex flex-col gap-4 pt-4">
            <div id="ui-socials" class="flex flex-wrap justify-center items-center gap-5 text-2xl mb-2"></div>
            <button onclick="downloadCV()" class="w-full py-3 bg-[var(--primary)] text-white rounded-lg font-bold shadow-lg active:scale-95 transition-transform flex items-center justify-center gap-2">
                <span class="material-symbols-outlined text-[18px]">download</span> DOWNLOAD CV
            </button>
        </div>
    </aside>

    <main id="main-content" class="flex-1 p-2 pb-4 md:p-8 overflow-hidden relative crt z-10 w-full" onclick="focusTerminal()">
        <div class="h-full terminal-container backdrop-blur-md rounded-xl border border-[var(--border)] flex flex-col overflow-hidden shadow-2xl relative">
            <div id="terminal" class="flex-1 p-4 md:p-10 overflow-y-auto terminal-scroll terminal-font pb-20">
                <div id="history">
                    <div class="animate-pulse text-slate-500 mb-4">Establishing connection to databanks...</div>
                </div>
                
                <div id="input-line" class="flex items-start gap-2 md:gap-3 mt-4 hidden">
                    <span class="text-green-500 font-bold whitespace-nowrap" id="prompt-prefix"></span>
                    <div class="flex-1 break-all relative min-h-[1.5em]">
                        <input id="hidden-input" type="text" autocomplete="off" spellcheck="false" autocapitalize="none">
                        <span id="visible-input" style="color: var(--term-highlight)"></span><span id="suggestion-text" class="opacity-40 italic pointer-events-none"></span><span class="cursor-block"></span>
                    </div>
                </div>
            </div>
            
            <div class="h-8 bg-black/5 border-t border-[var(--border)] flex items-center justify-between px-4 text-[10px] terminal-font text-[var(--primary)] shrink-0">
                <div class="flex items-center gap-2 md:gap-3">
                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                    <span id="ui-term-head" class="font-bold truncate max-w-[150px] md:max-w-none">booting...</span>
                </div>
                <div id="clock" class="hidden sm:block"></div>
            </div>
        </div>
    </main>

    <script>
        let db = {};
        let cvData = ""; 
        const hiddenInput = document.getElementById('hidden-input');
        const visibleInput = document.getElementById('visible-input');
        const suggestionText = document.getElementById('suggestion-text');
        const history = document.getElementById('history');
        const terminal = document.getElementById('terminal');
        const inputLine = document.getElementById('input-line');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('mobile-overlay');
        
        let isTyping = false;
        let promptText = "guest@local:~$";
        let availableCommands = [];

        const setUI = (id, val) => { const el = document.getElementById(id); if(el) el.innerText = val || ''; };

        function toggleSidebar() {
            const isClosed = sidebar.classList.contains('-translate-x-full');
            if(isClosed) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.classList.remove('opacity-0'), 10);
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('opacity-0');
                setTimeout(() => overlay.classList.add('hidden'), 300);
            }
        }
        overlay.addEventListener('click', toggleSidebar);

        async function init() {
            try {
                const res = await fetch('./data.json');
                if (!res.ok) throw new Error(`HTTP Error: ${res.status}`);
                try { db = await res.json(); } catch(e) { throw new Error(`JSON Syntax Error in data.json.`); }
                
                try {
                    const pRes = await fetch('./photo.json');
                    if (pRes.ok) {
                        const pJson = await pRes.json();
                        if (pJson.photo_base64) {
                            const pData = pJson.photo_base64.trim();
                            const photoEl = document.getElementById('ui-photo');
                            photoEl.src = pData.startsWith('data:image') ? pData : `data:image/jpeg;base64,${pData}`;
                        }
                    }
                } catch(e) {}

                try {
                    const cRes = await fetch('./cv.json');
                    if (cRes.ok) {
                        const cJson = await cRes.json();
                        cvData = cJson.cv_base64 || "";
                    }
                } catch(e) {}

                history.innerHTML = ""; 
                if (db.commands) {
                    availableCommands = Object.keys(db.commands);
                    if (!availableCommands.includes('clear')) availableCommands.push('clear');
                }

                if(db.config?.theme_color) document.documentElement.style.setProperty('--primary', db.config.theme_color);
                document.title = db.config?.site_title || "Portfolio";

                setUI('ui-name', db.profile?.name);
                setUI('ui-role', db.profile?.role);
                setUI('ui-badge', db.config?.id_badge_label);
                
                if(db.profile?.socials && Array.isArray(db.profile.socials)) {
                    document.getElementById('ui-socials').innerHTML = db.profile.socials
                        .filter(social => social.url && social.url.trim() !== "")
                        .map(social => 
                            `<a href="${social.url}" target="_blank" title="${social.name}" class="text-[var(--text)] hover:text-[var(--primary)] hover:scale-125 transition-transform">
                                <i class="${social.icon}"></i>
                            </a>`
                        ).join('');
                }
                
                const user = db.config?.terminal_user || "guest";
                const host = db.config?.terminal_host || "local";
                promptText = `${user}@${host}:~$`;
                setUI('ui-term-head', promptText);
                setUI('prompt-prefix', promptText);

                const ascii = db.config?.ascii_art || "MAINFRAME";
                const welcomeMsg = db.config?.welcome_msg || "System online.";
                
                await typeWriter(`<pre class="text-[var(--primary)] mb-4 leading-tight text-[6px] md:text-[10px]">${ascii}</pre>`, 1);
                await typeWriter(`<p class="opacity-70 mb-6 italic">${welcomeMsg}</p>`, 20);
                
                inputLine.classList.remove('hidden');
                focusTerminal();
                setTimeout(() => updateString(0, 0), 100);

            } catch (error) {
                history.innerHTML = `<div class="border border-red-500/50 bg-red-500/10 p-4 rounded text-red-400 mb-4"><h3 class="font-bold text-red-500 text-lg border-b border-red-500/30 pb-2 mb-2">SYSTEM FAILURE</h3><p class="mb-2">${error.message}</p></div>`;
            }
        }

        function downloadCV() {
            if (!cvData || cvData.trim() === "") {
                typeWriter(`<div class="mb-4 text-red-400">> Executing download... <span class="text-red-500 font-bold">ERROR: cv.json missing.</span></div>`, 0);
                return;
            }
            try {
                const base64Str = cvData.split(',').pop();
                const byteCharacters = atob(base64Str);
                const byteNumbers = new Array(byteCharacters.length);
                for (let i = 0; i < byteCharacters.length; i++) byteNumbers[i] = byteCharacters.charCodeAt(i);
                
                const blob = new Blob([new Uint8Array(byteNumbers)], {type: 'application/pdf'});
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url; link.download = "koushik_hiremath_resume.pdf";
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
                URL.revokeObjectURL(url);

                typeWriter(`<div class="mb-4 text-[var(--term-highlight)] opacity-80">> Packaging binary... <span class="text-green-500 font-bold">SUCCESS</span><br>> Saving to local disk.</div>`, 0);
            } catch (e) {
                typeWriter(`<div class="mb-4 text-red-400">> Executing download... <span class="text-red-500 font-bold">DECODE ERROR.</span></div>`, 0);
            }
        }

        function typeWriter(html, speed = 15) {
            return new Promise(resolve => {
                isTyping = true;
                const div = document.createElement('div');
                div.className = "mb-4";
                history.appendChild(div);
                
                let i = 0; let textBuffer = "";
                function type() {
                    if (i < html.length) {
                        let char = html.charAt(i);
                        if (char === '<') {
                            let tag = "";
                            while (i < html.length && html.charAt(i) !== '>') { tag += html.charAt(i); i++; }
                            tag += '>'; i++; textBuffer += tag; div.innerHTML = textBuffer; type();
                        } else {
                            textBuffer += char; div.innerHTML = textBuffer;
                            terminal.scrollTop = terminal.scrollHeight; i++;
                            setTimeout(type, speed);
                        }
                    } else { isTyping = false; resolve(); }
                }
                type();
            });
        }

        hiddenInput.addEventListener('input', () => { 
            if(!isTyping) {
                visibleInput.innerText = hiddenInput.value; 
                const val = hiddenInput.value.toLowerCase();
                if (val.length > 0) {
                    const match = availableCommands.find(cmd => cmd.startsWith(val));
                    suggestionText.innerText = match ? match.slice(val.length) : "";
                } else { suggestionText.innerText = ""; }
            }
        });

        hiddenInput.addEventListener('keydown', async (e) => {
            if (e.key === 'Tab') {
                e.preventDefault(); 
                if (suggestionText.innerText !== "" && !isTyping) {
                    hiddenInput.value += suggestionText.innerText;
                    visibleInput.innerText = hiddenInput.value;
                    suggestionText.innerText = "";
                }
                return;
            }

            if (e.key === 'Enter' && hiddenInput.value.trim() && !isTyping && db.commands) {
                const cmd = hiddenInput.value.trim().toLowerCase();
                const rawCmd = hiddenInput.value.trim();
                
                const cmdLog = document.createElement('div');
                cmdLog.className = "flex items-start gap-2 md:gap-3 mb-2 opacity-70";
                cmdLog.innerHTML = `<span class="text-green-500 font-bold">${promptText}</span><span style="color: var(--term-highlight)">${rawCmd}</span>`;
                history.appendChild(cmdLog);
                
                hiddenInput.value = ''; visibleInput.innerText = ''; suggestionText.innerText = ''; inputLine.classList.add('hidden');

                if (cmd === 'help') await typeWriter(db.commands.help);
                else if (cmd === 'clear') history.innerHTML = '';
                else if (cmd === 'about' && db.commands.about) await typeWriter(`<p class="text-[var(--primary)] font-bold mb-1">${db.commands.about.header}</p><p style="color: var(--term-highlight)">${db.commands.about.text}</p>`);
                else if (cmd === 'experience' && db.commands.experience) await typeWriter(db.commands.experience.map(exp => `<div class="mb-5 border-l-2 border-[var(--primary)] pl-4"><div class="font-bold tracking-wide" style="color: var(--term-highlight)">${exp.company}</div><div class="text-xs text-[var(--primary)] mb-1 font-bold">${exp.role} | ${exp.period}</div><p class="text-sm opacity-90">${exp.details}</p></div>`).join(''), 5);
                else if (cmd === 'skills' && db.commands.skills) await typeWriter(db.commands.skills.map(s => `<div class="mb-3 w-full max-w-md"><div class="flex justify-between text-xs mb-1 font-semibold" style="color: var(--term-highlight)"><span>${s.name}</span><span>${s.level}%</span></div><div class="w-full bg-slate-400/30 h-1.5"><div class="bg-[var(--primary)] h-full" style="width:${s.level}%"></div></div></div>`).join(''), 5);
                else if (cmd === 'contact') await typeWriter(`<div class="border border-[var(--primary)]/30 p-4 inline-block bg-[var(--primary)]/5 rounded" style="color: var(--term-highlight)">${db.commands.contact}</div>`);
                else await typeWriter(`<span class="text-red-500 bg-red-500/10 px-2 py-1">bash: ${cmd}: command not found. Type 'help'.</span>`);
                
                inputLine.classList.remove('hidden');
                focusTerminal();
            }
        });

        // The typing fix for mobile devices
        function focusTerminal() {
            if (!isTyping) hiddenInput.focus();
            setTimeout(() => { terminal.scrollTop = terminal.scrollHeight; }, 50);
        }

        const card = document.getElementById('id-card');
        const str = document.getElementById('string');
        const area = document.getElementById('card-area');
        let isDrag = false, sx, sy, x=0, y=0;
        
        function updateString(cx, cy) { 
            str.setAttribute('d', `M ${area.offsetWidth/2} 5 L ${area.offsetWidth/2 + cx} ${45 + cy}`); 
        }
        
        function startDrag(e) {
            isDrag = true; 
            card.classList.add('dragging'); area.classList.add('active-string'); card.style.animation = 'none'; 
            sx = e.type.includes('touch') ? e.touches[0].clientX : e.clientX; 
            sy = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
        }

        function moveDrag(e) {
            if (!isDrag) return; 
            if(e.type.includes('touch')) e.preventDefault(); 
            x = (e.type.includes('touch') ? e.touches[0].clientX : e.clientX) - sx; 
            y = (e.type.includes('touch') ? e.touches[0].clientY : e.clientY) - sy; 
            card.style.transform = `translate(${x}px, ${y}px)`; 
            updateString(x, y);
        }

        function endDrag() {
            if(!isDrag) return;
            isDrag = false; card.classList.remove('dragging'); card.style.transform = `translate(0,0)`; updateString(0,0); 
            setTimeout(() => { if(!isDrag){ area.classList.remove('active-string'); card.style.animation = 'sway 4s ease-in-out infinite alternate'; } }, 500);
        }
        
        card.addEventListener('mousedown', startDrag);
        card.addEventListener('touchstart', startDrag, { passive: false });
        window.addEventListener('mousemove', moveDrag);
        window.addEventListener('touchmove', moveDrag, { passive: false });
        window.addEventListener('mouseup', endDrag);
        window.addEventListener('touchend', endDrag);

        window.addEventListener('resize', () => { if (!isDrag) updateString(0, 0); });
        setInterval(() => { const clock = document.getElementById('clock'); if(clock) clock.innerText = new Date().toLocaleTimeString(); }, 1000);
        function toggleTheme() { const html = document.getElementById('root-html'); const icon = document.getElementById('theme-icon'); if (html.classList.contains('dark')) { html.classList.replace('dark', 'light'); icon.innerText = 'light_mode'; } else { html.classList.replace('light', 'dark'); icon.innerText = 'dark_mode'; } }

        window.onload = init;
    </script>
</body>
</html>
